spring.application.name=carpool-backend-1

#spring.application.name=spring-jwt-security2

server.port=8080


spring.datasource.url=jdbc:mysql://localhost:3306/carpool
spring.datasource.username=root
spring.datasource.password=${db_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${jwt_key}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000


cloudinary.cloud-name=${cloud_name}
cloudinary.api-key=${cloud_api_key}
cloudinary.api-secret=${cloud_api_secret}


#brevo.api.key = ${brevo_key}